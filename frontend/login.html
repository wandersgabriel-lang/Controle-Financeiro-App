<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Controle Financeiro</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-overlay">
        <div class="auth-card" id="loginCard">
            <h3 class="auth-title">Controle Financeiro</h3>
            <p class="auth-subtitle">Acesse sua conta para ver suas finanças.</p>
            <h2>Fazer Login</h2>
            <form id="formLogin" class="form" novalidate>
                <div class="form-group">
                    <label for="emailLogin">E-mail:</label>
                    <input type="email" id="emailLogin" placeholder="Seu email" required>
                </div>
                
                <div class="form-group">
                    <label for="senhaLogin">Senha:</label>
                    <input type="password" id="senhaLogin" placeholder="Sua senha secreta" required>
                </div>
                
                <button type="submit" class="btn-primary">Entrar</button>
            </form>
            <div class="auth-switch">
                <p class="auth-note">Ainda não tem conta? <a href="#" id="linkCadastro" class="form-toggle-link">Cadastre-se</a></p>
            </div>
        </div>

        <div class="auth-card" id="registroCard" style="display: none;">
            <h3 class="auth-title">Controle Financeiro</h3>
            <p class="auth-subtitle">Crie sua conta para começar.</p>
            <h2>Criar Conta</h2>
            <form id="formRegistro" class="form" novalidate>
                <div class="form-group">
                    <label for="nomeRegistro">Nome Completo:</label>
                    <input type="text" id="nomeRegistro" placeholder="João da Silva" required>
                </div>

                <div class="form-group">
                    <label for="emailRegistro">E-mail:</label>
                    <input type="email" id="emailRegistro" placeholder="Seu email" required>
                </div>
                
                <div class="form-group">
                    <label for="senhaRegistro">Criar Senha:</label>
                    <input type="password" id="senhaRegistro" placeholder="Uma senha forte..." required>
                </div>
                
                <button type="submit" class="btn-primary">Cadastrar</button>
            </form>
            <div class="auth-switch">
                <p class="auth-note">Já possui conta? <a href="#" id="linkLogin" class="form-toggle-link">Fazer Login</a></p>
            </div>
        </div>
    </div>

    <!-- Script de Autenticação Incorporado para Simplicidade -->
    <script>
        // Regra de Ouro: Se já estiver logado, foge pro painel!
        if (localStorage.getItem('financas_token')) {
            window.location.href = 'index.html';
        }

        const API_URL = '/api';
        
        // Elementos da UI
        const formLogin = document.getElementById('formLogin');
        const formRegistro = document.getElementById('formRegistro');
        const loginCard = document.getElementById('loginCard');
        const registroCard = document.getElementById('registroCard');

        // Alternância de Telas
        document.getElementById('linkCadastro').addEventListener('click', (e) => {
            e.preventDefault();
            loginCard.style.display = 'none';
            registroCard.style.display = 'block';
        });

        document.getElementById('linkLogin').addEventListener('click', (e) => {
            e.preventDefault();
            registroCard.style.display = 'none';
            loginCard.style.display = 'block';
        });

        // ================= Cadastro =================
        formRegistro.addEventListener('submit', async (e) => {
            e.preventDefault();
            const dados = {
                nome: document.getElementById('nomeRegistro').value,
                email: document.getElementById('emailRegistro').value,
                senha: document.getElementById('senhaRegistro').value
            };

            try {
                const res = await fetch(`${API_URL}/registro`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dados)
                });
                const responseData = await res.json();
                
                if (!res.ok) {
                    alert('Erro: ' + responseData.erro);
                } else {
                    alert('Conta criada com Sucesso! Faça o login agora.');
                    document.getElementById('linkLogin').click();
                }
            } catch (err) { alert('Falha ao conectar no servidor.'); }
        });

        // ================= Login =================
        formLogin.addEventListener('submit', async (e) => {
            e.preventDefault();
            const dados = {
                email: document.getElementById('emailLogin').value,
                senha: document.getElementById('senhaLogin').value
            };

            try {
                const res = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dados)
                });
                const responseData = await res.json();
                
                if (!res.ok) {
                    alert('Erro no Login: ' + responseData.erro);
                } else {
                    // Magia: Salva o Token ("Crachá") no navegador
                    localStorage.setItem('financas_token', responseData.token);
                    localStorage.setItem('financas_user', JSON.stringify(responseData.user));
                    
                    // Transfere o usuário para o sistema!
                    alert(`Bem vindo de volta, ${responseData.user.nome}!`);
                    window.location.href = 'index.html';
                }
            } catch (err) { alert('Falha ao conectar no servidor.'); }
        });
    </script>
</body>
</html>
